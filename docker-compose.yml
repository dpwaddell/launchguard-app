services:
  app:
    build:
      context: .
      args:
        VITE_SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: https://launchguard.sample-guard.com
      SHOPIFY_APP_URL: https://launchguard.sample-guard.com
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      CORS_ORIGINS: https://launchguard.sample-guard.com
      TRUST_PROXY: 1
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      OWNER_NOTIFICATION_EMAIL: ${OWNER_NOTIFICATION_EMAIL:-}
    ports:
      - "3105:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-launchguard}
      POSTGRES_USER: ${POSTGRES_USER:-launchguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchguard -d launchguard"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
