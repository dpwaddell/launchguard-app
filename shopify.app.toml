client_id = "e17e2b362d9d51d265bb78fb7032fb60"
name = "LaunchGuard"
application_url = "https://launchguard.sample-guard.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[access_scopes]
scopes = "read_products,write_products,read_customers,read_orders"

[auth]
redirect_urls = [
  "https://launchguard.sample-guard.com/auth/callback"
]

[app_proxy]
url = "https://launchguard.sample-guard.com/apps/launchguard"
subpath = "launchguard"
prefix = "apps"

[pos]
embedded = false
