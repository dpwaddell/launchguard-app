client_id = ""
name = "LaunchGuard"
application_url = "https://launchguard.sample-guard.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://launchguard.sample-guard.com/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
scopes = "read_products,write_products,read_customers,read_orders"

[auth]
redirect_urls = [
  "https://launchguard.sample-guard.com/auth/callback"
]

[app_proxy]
url = "https://launchguard.sample-guard.com/apps/launchguard"
subpath = "launchguard"
prefix = "apps"
